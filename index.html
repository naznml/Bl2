<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Биология — 1-нұсқа</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
      line-height: 1.5;
    }
    .container {
      width: min(920px, calc(100% - 24px));
      margin: 24px auto 48px;
    }
    .hero, .question-card, .result-card {
      background: #fff;
      border: 1px solid #e3e8f1;
      border-radius: 18px;
      box-shadow: 0 7px 24px rgba(28, 42, 70, .07);
    }
    .hero {
      padding: 24px;
      margin-bottom: 18px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 5vw, 36px);
    }
    .hero p {
      margin: 0;
      color: #647087;
    }
    .progress-wrap {
      margin-top: 18px;
      height: 10px;
      border-radius: 999px;
      background: #e9edf4;
      overflow: hidden;
    }
    .progress-bar {
      width: 0;
      height: 100%;
      background: #315fda;
      transition: width .25s ease;
    }
    .progress-text {
      margin-top: 8px;
      font-size: 14px;
      color: #647087;
    }
    .question-card {
      padding: 22px;
      margin-bottom: 16px;
    }
    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 32px;
      padding: 0 10px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: #eef3ff;
      color: #315fda;
      font-weight: 700;
      font-size: 14px;
    }
    .question-text {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
    }
    .options {
      display: grid;
      gap: 10px;
    }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      padding: 13px 14px;
      border: 1.5px solid #dbe1eb;
      border-radius: 12px;
      cursor: pointer;
      transition: .2s ease;
      background: #fff;
    }
    .option:hover {
      border-color: #8fa9ea;
      background: #f8faff;
    }
    .option input {
      margin-top: 4px;
      accent-color: #315fda;
      transform: scale(1.1);
    }
    .option.selected {
      border-color: #315fda;
      background: #eef3ff;
    }
    .option.correct {
      border-color: #159447;
      background: #eaf8ef;
      color: #0c6a31;
    }
    .option.incorrect {
      border-color: #d84646;
      background: #fff0f0;
      color: #a32929;
    }
    .explanation {
      display: none;
      margin-top: 14px;
      padding: 13px 14px;
      border-left: 4px solid #315fda;
      border-radius: 8px;
      background: #f4f7ff;
      color: #33405a;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 14px 20px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: #315fda;
      color: #fff;
    }
    .secondary {
      background: #e9edf4;
      color: #263249;
    }
    .result-card {
      display: none;
      padding: 24px;
      margin-top: 18px;
      text-align: center;
    }
    .score {
      margin: 4px 0 8px;
      font-size: clamp(34px, 8vw, 54px);
      font-weight: 800;
      color: #315fda;
    }
    .result-message {
      margin: 0;
      color: #647087;
    }
    @media (max-width: 600px) {
      .container { margin-top: 12px; }
      .hero, .question-card, .result-card { border-radius: 14px; }
      .hero, .question-card { padding: 17px; }
      .question-text { font-size: 17px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <h1>Биология — 1-нұсқа</h1>
      <p>20 сұрақ. Әр сұрақта бір дұрыс жауап бар.</p>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">Жауап берілді: 0 / 20</div>
    </section>

    <section id="quiz"></section>

    <div class="actions">
      <button class="primary" id="checkBtn">Нәтижені көрсету</button>
      <button class="secondary" id="resetBtn">Қайта бастау</button>
    </div>

    <section class="result-card" id="resultCard">
      <div>Сіздің нәтижеңіз</div>
      <div class="score" id="scoreText">0 / 20</div>
      <p class="result-message" id="resultMessage"></p>
    </section>
  </main>

  <script>
    const questions = [
      {
        q: "Қалпақшалы саңырауқұлақтардың ағаштар тамырымен селбесуі:",
        options: ["паразитизм", "микориза", "комменсализм", "мутуализм", "нейтрализм"],
        answer: 1,
        explanation: "Қалпақшалы саңырауқұлақ мицелийінің ағаш тамырымен селбесуін микориза деп атайды."
      },
      {
        q: "Адамның бел омыртқа саны:",
        options: ["4", "6", "7", "5", "12"],
        answer: 3,
        explanation: "Адамның омыртқа жотасында 5 бел омыртқа болады."
      },
      {
        q: "Нәруыздар биосинтезін іске асыратын органоид:",
        options: ["лизосома", "митохондрия", "рибосома", "центриоль", "вакуоль"],
        answer: 2,
        explanation: "Нәруыз молекулаларының синтезі рибосомаларда жүреді."
      },
      {
        q: "Жүгерінің отаны:",
        options: ["Орталық Америка", "Оңтүстік Азия", "Солтүстік Африка", "Батыс Еуропа", "Шығыс Австралия"],
        answer: 0,
        explanation: "Файлдағы дұрыс жауап — Орталық Америка."
      },
      {
        q: "Қанның құрамындағы плазманың мөлшері:",
        options: ["45%", "50%", "60%", "65%", "55%"],
        answer: 4,
        explanation: "Қан көлемінің шамамен 55%-ын плазма құрайды."
      },
      {
        q: "Ата тегіндегі белгілердін ұрпағында қайталануы:",
        options: ["идиоадаптация", "дивергенция", "рудимент", "атавизм", "дегенерация"],
        answer: 3,
        explanation: "Арғы ата-текке тән белгілердің ұрпақта қайта көрінуі атавизм деп аталады."
      },
      {
        q: "Қырықжапырақтарда топтасып орналасқан спорангийлер:",
        options: ["вайя", "сорус", "ризоид", "стробил", "проталлий"],
        answer: 1,
        explanation: "Қырықжапырақ жапырағындағы спорангийлер жиынтығы сорус деп аталады."
      },
      {
        q: "Иммундық жүйенің орталық мүшесі:",
        options: ["көкбауыр", "бауыр", "айырша без", "қалқанша без", "ұйқы безі"],
        answer: 2,
        explanation: "Айырша без иммундық жүйенің орталық мүшелерінің бірі болып саналады."
      },
      {
        q: "Жануар жасушасының сыртқы қабықшасында болады:",
        options: ["гликокаликс", "целлюлоза", "муреин", "лигнин", "суберин"],
        answer: 0,
        explanation: "Жануар жасушасының плазмалық мембранасының сыртында гликокаликс орналасады."
      },
      {
        q: "Омыртқа жотасының қисаюы:",
        options: ["лордоз", "кифоз", "артроз", "сколиоз", "остеоз"],
        answer: 3,
        explanation: "Омыртқа жотасының бүйір бағытта қисаюы сколиоз деп аталады."
      },
      {
        q: "Генетика терминін 1906 жылы ғылымға енгізген ағылшын биологы:",
        options: ["Г. Мендель", "Т. Морган", "У.Бэтсон", "Х. Де Фриз", "К. Корренс"],
        answer: 2,
        explanation: "«Генетика» терминін ғылымға У. Бэтсон енгізген."
      },
      {
        q: "Қосмекенділердің дәрнәсілерінің тынысалу мүшесі:",
        options: ["демтүтік", "өкпе", "тері", "ауа қапшығы", "желбезек"],
        answer: 4,
        explanation: "Қосмекенділердің дернәсілдері суда тіршілік етіп, желбезек арқылы тыныс алады."
      },
      {
        q: "Жарық түскенде заттың түсін ажырататын рецептор:",
        options: ["таяқша", "құтыша", "механорецептор", "терморецептор", "ноцицептор"],
        answer: 1,
        explanation: "Түсті ажыратуға торлы қабықтағы құтыша тәрізді рецепторлар қатысады."
      },
      {
        q: "Бүйректің құрылымдық және қызметтік бірлігі:",
        options: ["альвеола", "аксон", "нефрон", "остеон", "миофибрилла"],
        answer: 2,
        explanation: "Бүйректің негізгі құрылымдық және қызметтік бірлігі — нефрон."
      },
      {
        q: "Теріде болатын ерекше заттардан күннің ультракүлгін сәулелерінің әсерінен түзілетін витамин:",
        options: ["A", "E", "K", "D", "C"],
        answer: 3,
        explanation: "Ультракүлгін сәуленің әсерінен теріде D витамині түзіледі."
      },
      {
        q: "Акула мен дельфиннің дене пішіндерінің ұқсастығын анықтайтын эволюциялық заңдылық:",
        options: ["дивергенция", "параллелизм", "ароморфоз", "дегенерация", "конвергенция"],
        answer: 4,
        explanation: "Шығу тегі әртүрлі ағзаларда ұқсас ортаға бейімделуден ұқсас белгілердің қалыптасуы конвергенция деп аталады."
      },
      {
        q: "Асқорыту бездерінің ішіндегі ең үлкен без:",
        options: ["бауыр", "ұйқы безі", "сілекей безі", "қарын безі", "ішек безі"],
        answer: 0,
        explanation: "Адам ағзасындағы ең ірі асқорыту безі — бауыр."
      },
      {
        q: "Жыныс жасушаларындағы хромосомалар саны:",
        options: ["22", "44", "46", "48", "23"],
        answer: 4,
        explanation: "Адамның жыныс жасушаларында хромосомалардың гаплоидты жиынтығы — 23."
      },
      {
        q: "Өсімдіктерге жасыл түс беретін пигмент:",
        options: ["каротин", "хлорофилл", "ксантофилл", "антоциан", "фикоэритрин"],
        answer: 1,
        explanation: "Өсімдіктің жасыл түсі хлорофилл пигментіне байланысты."
      },
      {
        q: "Сүтқоректілердің кеуде қуысы мен құрсақ қуыстарын бөліп тұратын мүше:",
        options: ["плевра", "көмей", "көкет (диафрагма)", "кеңірдек", "құрсақ пердесі"],
        answer: 2,
        explanation: "Кеуде және құрсақ қуыстарын көкет, яғни диафрагма бөліп тұрады."
      }
    ];

    const quiz = document.getElementById("quiz");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultCard = document.getElementById("resultCard");
    const scoreText = document.getElementById("scoreText");
    const resultMessage = document.getElementById("resultMessage");
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");

    function renderQuiz() {
      quiz.innerHTML = "";
      questions.forEach((item, qIndex) => {
        const card = document.createElement("article");
        card.className = "question-card";
        card.dataset.question = qIndex;

        const optionsHtml = item.options.map((option, oIndex) => `
          <label class="option">
            <input type="radio" name="q${qIndex}" value="${oIndex}">
            <span>${option}</span>
          </label>
        `).join("");

        card.innerHTML = `
          <div class="question-number">${qIndex + 1}-сұрақ</div>
          <h2 class="question-text">${item.q}</h2>
          <div class="options">${optionsHtml}</div>
          <div class="explanation"><strong>Түсіндірме:</strong> ${item.explanation}</div>
        `;
        quiz.appendChild(card);
      });

      document.querySelectorAll('input[type="radio"]').forEach(input => {
        input.addEventListener("change", event => {
          const card = event.target.closest(".question-card");
          card.querySelectorAll(".option").forEach(label => label.classList.remove("selected"));
          event.target.closest(".option").classList.add("selected");
          updateProgress();
        });
      });
      updateProgress();
    }

    function updateProgress() {
      const answered = questions.filter((_, i) =>
        document.querySelector(`input[name="q${i}"]:checked`)
      ).length;
      progressText.textContent = `Жауап берілді: ${answered} / ${questions.length}`;
      progressBar.style.width = `${(answered / questions.length) * 100}%`;
    }

    function checkAnswers() {
      let score = 0;

      questions.forEach((item, qIndex) => {
        const card = document.querySelector(`[data-question="${qIndex}"]`);
        const selected = card.querySelector(`input[name="q${qIndex}"]:checked`);
        const labels = card.querySelectorAll(".option");

        labels.forEach((label, oIndex) => {
          label.classList.remove("selected", "correct", "incorrect");
          const input = label.querySelector("input");
          input.disabled = true;

          if (oIndex === item.answer) {
            label.classList.add("correct");
          }
          if (selected && Number(selected.value) === oIndex && oIndex !== item.answer) {
            label.classList.add("incorrect");
          }
        });

        if (selected && Number(selected.value) === item.answer) score++;
        card.querySelector(".explanation").style.display = "block";
      });

      scoreText.textContent = `${score} / ${questions.length}`;
      const percent = Math.round((score / questions.length) * 100);

      if (percent >= 90) resultMessage.textContent = "Өте жақсы нәтиже!";
      else if (percent >= 70) resultMessage.textContent = "Жақсы нәтиже. Қателерді қайта қарап шығыңыз.";
      else if (percent >= 50) resultMessage.textContent = "Орташа нәтиже. Тақырыптарды қайталау қажет.";
      else resultMessage.textContent = "Материалды қайта қарап, тестті тағы орындаңыз.";

      resultCard.style.display = "block";
      resultCard.scrollIntoView({ behavior: "smooth", block: "center" });
      checkBtn.disabled = true;
      checkBtn.style.opacity = ".65";
    }

    function resetQuiz() {
      renderQuiz();
      resultCard.style.display = "none";
      checkBtn.disabled = false;
      checkBtn.style.opacity = "1";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    checkBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetQuiz);

    renderQuiz();
  </script>
</body>
</html>
