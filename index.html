      text-align: left;

      background: #ecfdf5;

    .variant-card p {

      color: #0f172a;
    }

    .test-header p {
      color: #475569;
      font-weight: 700;
    }

      color: #1d4ed8;
      padding: 9px 15px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
    }

    .question {
      border: 1px solid #e2e8f0;
      background: #ffffff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .question-title {
      font-weight: 850;
      color: #0f172a;
      margin-bottom: 13px;
      font-size: 17px;
    }

    .options {
      display: grid;
      gap: 9px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #dbe3ee;
      background: #f8fafc;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .option:hover {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .option input {
      margin-top: 4px;
      accent-color: #0f766e;
    }

    .option.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #14532d;
      font-weight: 800;
    }

    .option.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #7f1d1d;
    }

    .answer-box {
      display: none;
      margin-top: 13px;
      padding: 14px;
      border-radius: 14px;
      background: #f8fafc;
      border-left: 5px solid #0f766e;
    }

    .answer-box.show {
      display: block;
    }

    .answer-box strong {
      color: #0f766e;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

      border-radius: 16px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 900;
      transition: 0.18s ease;

      background: #0f766e;
      color: #ffffff;
    }

      background: #115e59;

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;

      }

      .question {

      }

    const variantGrid = document.getElementById("variantGrid");
    const testArea = document.getElementById("testArea");

    function renderVariantCards() {
      variantGrid.innerHTML = tests.map((test, index) => `
        <button class="variant-card ${index === 0 ? "active" : ""}" onclick="openTest(${index})">
          <span>${index + 1}</span>
          <h2>${test.title}</h2>
          <p>${test.questions.length} сұрақ</p>
        </button>
      `).join("");
    }

    function renderTests() {
      testArea.innerHTML = tests.map((test, testIndex) => `
        <div class="test-panel ${testIndex === 0 ? "active" : ""}" id="test-${testIndex}">
          <div class="test-header">
            <div>
              <h2>${test.title}</h2>
              <p>${test.code}</p>
            </div>
            <div class="badge">${test.questions.length} сұрақ</div>
          </div>

          <div class="questions">
            ${test.questions.map((q, qIndex) => `
              <div class="question" data-test="${testIndex}" data-question="${qIndex}">
                <div class="question-title">${qIndex + 1}. ${q.text}</div>

                <div class="options">
                  ${q.options.map((opt, optIndex) => `
                    <label class="option" data-option="${optIndex}">
                      <input type="radio" name="t${testIndex}q${qIndex}" value="${optIndex}">
                      <span>${String.fromCharCode(65 + optIndex)}) ${opt}</span>
                    </label>
                  `).join("")}
                </div>

                <div class="answer-box">
                  <p><strong>Дұрыс жауап:</strong> ${String.fromCharCode(65 + q.answer)}) ${q.options[q.answer]}</p>
                  <p><strong>Түсіндірме:</strong> ${q.explanation}</p>
                </div>
              </div>
            `).join("")}
          </div>

          <div class="actions">
            <button class="btn btn-primary" onclick="showResult(${testIndex})">Нәтижені көрсету</button>
            <button class="btn btn-secondary" onclick="resetTest(${testIndex})">Қайта тапсыру</button>
          </div>

          <div class="result-box" id="result-${testIndex}"></div>
        </div>
      `).join("");
    }

    function openTest(index) {
      document.querySelectorAll(".test-panel").forEach(panel => {
        panel.classList.remove("active");
      });

      document.querySelectorAll(".variant-card").forEach(card => {
        card.classList.remove("active");
      });

      document.getElementById(`test-${index}`).classList.add("active");
      document.querySelectorAll(".variant-card")[index].classList.add("active");

      document.getElementById(`test-${index}`).scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    function showResult(testIndex) {
      const test = tests[testIndex];
      let score = 0;

      test.questions.forEach((q, qIndex) => {
        const questionEl = document.querySelector(
          `.question[data-test="${testIndex}"][data-question="${qIndex}"]`
        );

        const selectedInput = questionEl.querySelector("input:checked");
        const optionEls = questionEl.querySelectorAll(".option");

        optionEls.forEach(option => {
          option.classList.remove("correct", "wrong");
        });

        optionEls[q.answer].classList.add("correct");

        if (selectedInput) {
          const selectedValue = Number(selectedInput.value);

          if (selectedValue === q.answer) {
            score++;
          } else {
            optionEls[selectedValue].classList.add("wrong");
          }
        }

        questionEl.querySelector(".answer-box").classList.add("show");
      });

      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.add("show");
      resultBox.textContent = `Сіздің нәтижеңіз: ${score}/${test.questions.length}`;

      resultBox.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function resetTest(testIndex) {
      const panel = document.getElementById(`test-${testIndex}`);

      panel.querySelectorAll("input").forEach(input => {
        input.checked = false;
      });

      panel.querySelectorAll(".option").forEach(option => {
        option.classList.remove("correct", "wrong");
      });

      panel.querySelectorAll(".answer-box").forEach(box => {
        box.classList.remove("show");
      });

      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.remove("show");
      resultBox.textContent = "";

      panel.scrollIntoView({
        behavior: "smooth",
        block: "start"
      });
    }

    renderVariantCards();
    renderTests();
  </script>
