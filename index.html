        "text": "Атмосферада көмірқышқыл газы концентрациясының артуы теңіз суында CO₂ көбеюіне алып келеді. Бұл құбылыс:",
        "multiple": false,
        "options": [
          "Мұхиттың қышқылдануы",
          "Азот айналымының үзілуі",
          "Судың тұщылануы",
          "Фотосинтездің толық тоқтауы",
          "Озон қабатының қалпына келуі"
        ],
        "answer": [
          0
        ],
        "explanation": "CO₂ теңіз суында көбейгенде су қышқылданады, бұл мұхиттың қышқылдануы деп аталады."
      },
      {
        "text": "АаВВ генотипінен алынатын гамета саны:",
        "multiple": false,
        "options": [
          "4",
          "8",
          "2",
          "1",
          "3"
        ],
        "answer": [
          2
        ],
        "explanation": "АаВВ генотипінде бір ген гетерозиготалы, сондықтан гамета түрі 2 болады."
      }
    ]
  }
];

    const testArea = document.getElementById("testArea");
    const variantGrid = document.getElementById("variantGrid");

    function renderCards() {
      variantGrid.innerHTML = tests.map((test, index) => `
        <button class="variant-card ${index === 0 ? "active" : ""}" onclick="openTest(${index})">
          <span>${index + 1}</span>
          <h2>${test.title}</h2>
          <p>${test.questions.length} сұрақ</p>
        </button>
      `).join("");
    }

    function renderTests() {
      testArea.innerHTML = tests.map((test, testIndex) => `
        <div class="test-panel ${testIndex === 0 ? "active" : ""}" id="test-${testIndex}">
          <div class="test-header">
            <div>
              <h2>${test.title}</h2>
              <p>${test.code}</p>
            </div>
            <div class="badge">${test.questions.length} сұрақ</div>
          </div>

          <div class="questions">
            ${test.questions.map((q, qIndex) => `
              <div class="question" data-test="${testIndex}" data-question="${qIndex}">
                <div class="question-title">${qIndex + 1}. ${q.text}</div>
                <div class="options">
                  ${q.options.map((opt, optIndex) => `
                    <label class="option" data-option="${optIndex}">
                      <input type="radio" name="t${testIndex}q${qIndex}" value="${optIndex}">
                      <span>${String.fromCharCode(65 + optIndex)}) ${opt}</span>
                    </label>
                  `).join("")}
                </div>
                <div class="answer-box">
                  <p><strong>Дұрыс жауап:</strong> ${String.fromCharCode(65 + q.answer[0])}) ${q.options[q.answer[0]]}</p>
                  <p><strong>Түсіндірме:</strong> ${q.explanation}</p>
                </div>
              </div>
            `).join("")}
          </div>

          <div class="actions">
            <button class="btn btn-primary" onclick="showResult(${testIndex})">Нәтижені көрсету</button>
            <button class="btn btn-secondary" onclick="resetTest(${testIndex})">Қайта тапсыру</button>
          </div>

          <div class="result-box" id="result-${testIndex}"></div>
        </div>
      `).join("");
    }

    function openTest(index) {
      document.querySelectorAll(".test-panel").forEach(panel => panel.classList.remove("active"));
      document.getElementById(`test-${index}`).classList.add("active");
      document.querySelectorAll(".variant-card").forEach(card => card.classList.remove("active"));
      document.querySelectorAll(".variant-card")[index].classList.add("active");
      document.getElementById(`test-${index}`).scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function showResult(testIndex) {
      const test = tests[testIndex];
      let score = 0;

      test.questions.forEach((q, qIndex) => {
        const questionEl = document.querySelector(`.question[data-test="${testIndex}"][data-question="${qIndex}"]`);
        const selectedInput = questionEl.querySelector("input:checked");
        const selectedValue = selectedInput ? Number(selectedInput.value) : null;
        const optionEls = questionEl.querySelectorAll(".option");

        optionEls.forEach(option => option.classList.remove("correct", "wrong"));
        optionEls[q.answer[0]].classList.add("correct");

        if (selectedValue !== null && selectedValue !== q.answer[0]) {
          optionEls[selectedValue].classList.add("wrong");
        }

        if (selectedValue === q.answer[0]) score++;
        questionEl.querySelector(".answer-box").classList.add("show");
      });

      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.add("show");
      resultBox.textContent = `Сіздің нәтижеңіз: ${score}/${test.questions.length}`;
      resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    function resetTest(testIndex) {
      const panel = document.getElementById(`test-${testIndex}`);
      panel.querySelectorAll("input").forEach(input => input.checked = false);
      panel.querySelectorAll(".option").forEach(option => option.classList.remove("correct", "wrong"));
      panel.querySelectorAll(".answer-box").forEach(box => box.classList.remove("show"));
      const resultBox = document.getElementById(`result-${testIndex}`);
      resultBox.classList.remove("show");
      resultBox.textContent = "";
      panel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    renderCards();
    renderTests();
  </script>
</body>
</html>
