function render(){quiz.innerHTML=`<section class="panel"><h1>${current+1}-нұсқа</h1><p class="muted">Бір сұрақта 1, 2 немесе 3 дұрыс жауап болуы мүмкін.</p></section>`;variants[current].forEach((x,qi)=>{const c=document.createElement('article');c.className='card';c.dataset.q=qi;c.innerHTML=`<div class="num">${qi+1}-сұрақ</div><div class="q">${x.q}</div><div class="hint">Барлық дұрыс жауаптарды таңдаңыз</div><div class="opts">${x.options.map((o,oi)=>`<label class="opt"><input type="checkbox" name="q${qi}" value="${oi}"><span class="letter">${letters[oi]})</span><span>${o}</span></label>`).join('')}</div><div class="expl"><b>Дұрыс жауаптар:</b> ${x.correct.map(i=>letters[i]+') '+x.options[i]).join('; ')}</div>`;quiz.appendChild(c)});document.querySelectorAll('input[type=checkbox]').forEach(r=>r.onchange=e=>{if(locked)return;const l=e.target.closest('.opt');l.classList.toggle('sel',e.target.checked);progress()});progress()}

function sameSet(a,b){return a.length===b.length&&a.every(x=>b.includes(x))}
function check(){if(locked)return;locked=true;let s=0;variants[current].forEach((x,qi)=>{const c=document.querySelector(`[data-q="${qi}"]`);const chosen=[...c.querySelectorAll(`input[name=q${qi}]:checked`)].map(e=>+e.value);if(sameSet(chosen,x.correct))s++;c.querySelectorAll('.opt').forEach((l,oi)=>{l.classList.remove('sel');l.querySelector('input').disabled=true;if(x.correct.includes(oi))l.classList.add('ok');if(chosen.includes(oi)&&!x.correct.includes(oi))l.classList.add('bad')});c.querySelector('.expl').style.display='block'});document.getElementById('score').textContent=`${s} / 20`;document.getElementById('msg').textContent=s>=18?'Өте жақсы нәтиже!':s>=14?'Жақсы нәтиже. Қателерді қайталаңыз.':s>=10?'Орташа нәтиже. Тақырыптарды қайталау қажет.':'Материалды қайта қарап шығыңыз.';result.style.display='block';result.scrollIntoView({behavior:'smooth'})}
