, "мишық"], "answer": 2}, {"q": "Жалпы күрек тістердің саны:", "a": "8", "options": ["11", "12", "8", "10", "9"], "answer": 2}, {"q": "Омыртқа жотасының қисаюы:", "a": "сколиоз", "options": ["паротит", "цистит", "Лейкемия", "сколиоз", "тісжегі (кариес)"], "answer": 3}, {"q": "Зат алмасу, жүрек қантамырлар жүйесі, зәр шығару мен ұйқы қызметін реттейтін ми:", "a": "аралық ми", "options": ["аралық ми", "жұтқыншақ", "ми көпірі", "айырша без", "бауыр"], "answer": 0}, {"q": "Қиыршық жасушалары бар ұлпа:", "a": "тірек", "options": ["фотосинтездеуші", "мезодерма", "тірек", "жабын ұлпа (өң)", "дәнекер ұлпадан"], "answer": 2}, {"q": "Екі жапырақтан бір-біріне қарама-қарсы бекінетін өсімдік:", "a": "үйеңкі", "options": ["жүгері", "үйеңкі", "ашытқы", "қарағай", "итжүзім"], "answer": 1}, {"q": "Бүрдің етті бөлігінен дәмді мармелад дайындалатын өсімдік:", "a": "кәдімгі арша", "options": ["жолжелкен", "бүлдірген", "хлорелла", "мандарин", "кәдімгі арша"], "answer": 4}, {"q": "Жасушалары бір-біріне тығыз жанасқан ұлпа:", "a": "жабын ұлпа (өң)", "options": ["фотосинтездеуші", "тірек", "жабын ұлпа (өң)", "мезодерма", "дәнекер"], "answer": 2}]];
let current=-1,locked=false;
const home=document.getElementById('home'),grid=document.getElementById('variantGrid'),quiz=document.getElementById('quiz'),topbar=document.getElementById('topbar'),actions=document.getElementById('actions'),result=document.getElementById('result');

variants.forEach((v,i)=>{
 const b=document.createElement('button'); b.className='variant';
 b.innerHTML=`<strong>${i+1}-нұсқа</strong><span>20 сұрақ</span>`;
 b.onclick=()=>openVariant(i); grid.appendChild(b);
});

function openVariant(i){current=i;locked=false;home.style.display='none';topbar.style.display='flex';actions.style.display='flex';result.style.display='none';render();window.scrollTo(0,0)}
function render(){
 quiz.innerHTML=`<section class="panel"><h1>${current+1}-нұсқа</h1><p class="muted">Әр сұрақтан бір жауапты таңдаңыз.</p></section>`;
 variants[current].forEach((x,qi)=>{
  const c=document.createElement('article');c.className='card';c.dataset.q=qi;
  c.innerHTML=`<div class="num">${qi+1}-сұрақ</div><div class="q">${x.q}</div><div class="opts">${x.options.map((o,oi)=>`<label class="opt"><input type="radio" name="q${qi}" value="${oi}"><span>${o}</span></label>`).join('')}</div><div class="expl"><b>Дұрыс жауап:</b> ${x.a}</div>`;
  quiz.appendChild(c);
 });
 document.querySelectorAll('input[type=radio]').forEach(r=>r.onchange=e=>{if(locked)return;const c=e.target.closest('.card');c.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));e.target.closest('.opt').classList.add('sel');progress()});
 progress();
}
function progress(){
 let n=variants[current].filter((_,i)=>document.querySelector(`input[name=q${i}]:checked`)).length;
 document.getElementById('bar').style.width=(n/20*100)+'%';document.getElementById('ptext').textContent=`Жауап берілді: ${n} / 20`;
}
function check(){
 if(locked)return;locked=true;let s=0;
 variants[current].forEach((x,qi)=>{
  const c=document.querySelector(`[data-q="${qi}"]`),sel=c.querySelector(`input[name=q${qi}]:checked`);
  c.querySelectorAll('.opt').forEach((l,oi)=>{l.classList.remove('sel');l.querySelector('input').disabled=true;if(oi===x.answer)l.classList.add('ok');if(sel&&+sel.value===oi&&oi!==x.answer)l.classList.add('bad')});
  if(sel&&+sel.value===x.answer)s++;c.querySelector('.expl').style.display='block';
 });
 document.getElementById('score').textContent=`${s} / 20`;
 document.getElementById('msg').textContent=s>=18?'Өте жақсы нәтиже!':s>=14?'Жақсы нәтиже. Қателерді қайталаңыз.':s>=10?'Орташа нәтиже. Тақырыптарды қайталау қажет.':'Материалды қайта қарап шығыңыз.';
 result.style.display='block';result.scrollIntoView({behavior:'smooth'});
}
function restart(){locked=false;result.style.display='none';render();window.scrollTo({top:0,behavior:'smooth'})}
function goHome(){current=-1;quiz.innerHTML='';home.style.display='block';topbar.style.display='none';actions.style.display='none';result.style.display='none';window.scrollTo(0,0)}
</script>
